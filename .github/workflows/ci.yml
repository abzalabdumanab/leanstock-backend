name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: leanstock
          POSTGRES_PASSWORD: leanstock
          POSTGRES_DB: leanstock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://leanstock:leanstock@localhost:5432/leanstock_test?schema=public
      TEST_DATABASE_URL: postgresql://leanstock:leanstock@localhost:5432/leanstock_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-access-secret-ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret-ci-refresh-secret
      CORS_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test
      - run: docker build -t leanstock-backend .
